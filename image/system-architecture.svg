<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 700 34px "Noto Sans JP", "Yu Gothic", sans-serif; fill: #1f2937; }
      .label { font: 600 20px "Noto Sans JP", "Yu Gothic", sans-serif; fill: #111827; }
      .text  { font: 400 16px "Noto Sans JP", "Yu Gothic", sans-serif; fill: #374151; }
      .small { font: 400 14px "Noto Sans JP", "Yu Gothic", sans-serif; fill: #4b5563; }
      .box { rx: 18; ry: 18; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#f8fafc"/>
  <text x="700" y="70" text-anchor="middle" class="title">システム構成図（フロントエンド ↔ バックエンド ↔ データベース）</text>

  <!-- Frontend -->
  <rect class="box" x="90" y="180" width="360" height="430" fill="#eef2ff" stroke="#6366f1"/>
  <text x="270" y="225" text-anchor="middle" class="label">フロントエンド</text>
  <text x="120" y="265" class="text">• 利用者ブラウザ（PC/スマホ）</text>
  <text x="120" y="295" class="text">• HTML / CSS / JavaScript</text>
  <text x="120" y="325" class="text">• 予約フォーム入力・送信</text>
  <text x="120" y="355" class="text">• 空き枠取得（fetch）</text>
  <text x="120" y="385" class="text">• 管理画面（admin/login）</text>
  <text x="120" y="435" class="small">主な静的ページ:</text>
  <text x="120" y="460" class="small">index.html / workshop.html / registration.html</text>
  <text x="120" y="485" class="small">magazine.html など</text>

  <!-- Backend -->
  <rect class="box" x="520" y="140" width="380" height="510" fill="#ecfeff" stroke="#06b6d4"/>
  <text x="710" y="185" text-anchor="middle" class="label">バックエンド（Spring Boot）</text>
  <text x="550" y="225" class="text">• ReservationApplication</text>
  <text x="550" y="265" class="text">Controller:</text>
  <text x="570" y="293" class="small">- /api/reservations/**</text>
  <text x="570" y="318" class="small">- /api/mail/subscriptions/**</text>
  <text x="570" y="343" class="small">- /api/admin/**（認証必須）</text>

  <text x="550" y="390" class="text">Service:</text>
  <text x="570" y="418" class="small">- ReservationService</text>
  <text x="570" y="443" class="small">- MailSubscriptionService</text>

  <text x="550" y="490" class="text">Repository（JPA）:</text>
  <text x="570" y="518" class="small">- ReservationRepository</text>
  <text x="570" y="543" class="small">- SlotCapacityRepository</text>
  <text x="570" y="568" class="small">- MailSubscriptionRepository</text>

  <!-- DB -->
  <rect class="box" x="970" y="210" width="330" height="360" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="1135" y="255" text-anchor="middle" class="label">データベース</text>
  <text x="1000" y="300" class="text">• Reservation（予約情報）</text>
  <text x="1000" y="333" class="text">• SlotCapacity（定員設定）</text>
  <text x="1000" y="366" class="text">• MailSubscription（会員情報）</text>
  <text x="1000" y="420" class="small">予約番号・日時・人数・連絡先</text>
  <text x="1000" y="445" class="small">メール登録/解除状態・更新日時</text>

  <!-- Arrows -->
  <line x1="450" y1="380" x2="520" y2="380" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="520" y1="430" x2="450" y2="430" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="485" y="365" text-anchor="middle" class="small">HTTP/HTTPS</text>
  <text x="485" y="455" text-anchor="middle" class="small">JSON Response</text>

  <line x1="900" y1="380" x2="970" y2="380" stroke="#6b7280" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="970" y1="430" x2="900" y2="430" stroke="#9ca3af" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="935" y="365" text-anchor="middle" class="small">JPA / SQL</text>
  <text x="935" y="455" text-anchor="middle" class="small">Query Result</text>

  <!-- Footer -->
  <text x="700" y="770" text-anchor="middle" class="small">公開API: 予約・メール登録 / 管理API: 予約・会員サマリー参照（認証付き）</text>
</svg>
